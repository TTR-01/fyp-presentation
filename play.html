            position: relative;\n            display: flex;\n            flex-direction: column;\n        }\n        .accent-bar {\n            width: 64px;\n            height: 2px;\n            background-color: #DA7756;\n            margin-top: 12px;\n        }\n        .block-diagram {\n            background: #FFFFFF;\n            border: 1px solid #E0E0E0;\n            border-radius: 8px;\n            padding: 16px;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            gap: 10px;\n        }\n        .app-icon-box {\n            background: #F5E6E0;\n            border-radius: 12px;\n            width: 70px;\n            height: 70px;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            transition: transform 0.3s ease;\n        }\n        .app-icon-box:hover {\n            transform: translateY(-4px);\n        }\n        .kicker-box {\n            border-left: 4px solid #DA7756;\n            background-color: #FDF1ED;\n            padding: 12px 20px;\n            margin-top: 12px;\n        }\n        .duty-table {\n            width: 100%;\n            border-collapse: collapse;\n            font-size: 14px;\n        }\n        .duty-table th {\n            background-color: #1a2a4a;\n            color: #FFFFFF;\n            padding: 8px;\n            text-align: center;\n            font-weight: 600;\n        }\n        .duty-table td {\n            background-color: #FFFFFF;\n            border: 1px solid #E0E0E0;\n            padding: 8px;\n            text-align: center;\n            color: #333333;\n        }\n        .duty-table tr:hover td {\n            background-color: #FDF1ED;\n        }\n        .formula-box {\n            background: #F5F5F5;\n            border: 1px solid #CCCCCC;\n            border-radius: 6px;\n            padding: 10px 16px;\n            text-align: center;\n            font-size: 15px;\n            font-weight: 600;\n            color: #000000;\n        }\n    </style>\n</head>\n<body>\n    <div class=\"slide-container\">\n        <!-- Content -->\n        <div class=\"relative z-10 flex flex-col flex-grow p-[50px]\">\n            <!-- Header -->\n            <header class=\"flex-shrink-0 pb-3\">\n                <h1 id=\"page-title\" class=\"text-4xl font-semibold text-[#000000]\">Introduction to DC-DC Converters</h1>\n                <div class=\"accent-bar\"></div>\n            </header>\n\n            <!-- Main Content -->\n            <main class=\"flex-grow flex gap-10 mt-4\">\n                <!-- Left Column: Definition & Bullets -->\n                <div class=\"w-1/2 flex flex-col justify-start\">\n                    <div class=\"mb-3 definition-text\">\n                        <p class=\"text-base text-[#333333] leading-relaxed\">\n                            <span class=\"font-bold text-[#000000]\">What is a DC-DC Converter?</span><br>\n                            Power electronic circuits that convert a DC input voltage to a regulated DC output voltage according to load requirements [Lei et al., 2023]. Efficiency is critical — power losses reduce output power, increase heat, and shorten component lifetimes.\n                        </p>\n                    </div>\n\n                    <ul class=\"space-y-2.5 mb-3\">\n                        <li class=\"flex items-start gap-3 definition-text\">\n                            <div class=\"mt-1.5 w-2 h-2 rounded-full bg-[#DA7756] flex-shrink-0\"></div>\n                            <p class=\"text-base text-[#333333] leading-relaxed\">\n                                <span class=\"font-bold text-[#000000]\">Non-Inverting Buck-Boost Converters:</span> Unlike conventional buck-boost (which inverts output polarity), SEPIC and ZETA maintain positive output polarity. They can step-up (D&gt;0.5), step-down (D&lt;0.5), or unity gain (D=0.5). Ideal duty cycle: D = V<sub>o</sub>/(V<sub>in</sub>+V<sub>o</sub>).\n                            </p>\n                        </li>\n                        <li class=\"flex items-start gap-3 definition-text\">\n                            <div class=\"mt-1.5 w-2 h-2 rounded-full bg-[#DA7756] flex-shrink-0\"></div>\n                            <p class=\"text-base text-[#333333] leading-relaxed\">\n                                <span class=\"font-bold text-[#000000]\">Shared Voltage Transfer Ratio (CCM):</span> V<sub>o</sub>/V<sub>in</sub> = D/(1−D) for both topologies. At 9V input → D = 12/21 = 0.571. At 15V input → D = 12/27 = 0.444. Non-ideal parasitics push actual D slightly higher (0.455–0.590 in this project).\n                            </p>\n                        </li>\n                    </ul>\n\n                    <div class=\"formula-box mb-3 definition-text\">\n                        V<sub>in</sub> = 9, 12 or 15V → V<sub>o</sub> = 12V (regulated)\n                    </div>\n\n                    <div class=\"kicker-box definition-text\">\n                        <p class=\"text-sm italic text-[#666666] leading-relaxed\">\n                            <span class=\"font-bold text-[#DA7756]\">Research Context:</span> While SEPIC and ZETA share identical voltage gain, their different internal structures lead to different current pathways, voltage stresses, ripple profiles, and loss distributions. Few studies compare both under identical conditions [Sharma et al., 2024].\n                        </p>\n                    </div>\n                </div>\n\n                <!-- Right Column: Diagram, Table & Icons -->\n                <div class=\"w-1/2 flex flex-col justify-start gap-3.5\">\n                    <!-- Block Diagram -->\n                    <div class=\"block-diagram diagram-container\">\n                        <p class=\"text-xs font-semibold text-[#999999] uppercase tracking-widest mb-1\">DC-DC Converter Block Diagram</p>\n                        <div class=\"flex items-center gap-3\">\n                            <div class=\"px-4 py-2 bg-[#F5F5F5] border border-[#CCCCCC] rounded text-sm font-medium text-[#000000]\">V<sub>IN</sub><br><span class=\"text-xs text-[#666666]\">9/12/15V</span></div>\n                            <i class=\"fas fa-arrow-right text-xl text-[#DA7756]\"></i>\n                            <div class=\"px-8 py-6 bg-[#1a2a4a] text-white rounded-lg shadow-md text-center\">\n                                <p class=\"font-bold text-sm\">Power Stage</p>\n                                <p class=\"text-xs opacity-80 mt-0.5\">(SEPIC / ZETA)</p>\n                            </div>\n                            <i class=\"fas fa-arrow-right text-xl text-[#DA7756]\"></i>\n                            <div class=\"px-4 py-2 bg-[#F5F5F5] border border-[#CCCCCC] rounded text-sm font-medium text-[#000000]\">V<sub>OUT</sub><br><span class=\"text-xs text-[#666666]\">12V</span></div>\n                        </div>\n                    </div>\n\n                    <!-- Duty Cycle Table -->\n                    <div class=\"table-container\">\n                        <table class=\"duty-table\">\n                            <thead>\n                                <tr>\n                                    <th>V<sub>in</sub></th>\n                                    <th>Ideal D</th>\n                                    <th>Mode</th>\n                                </tr>\n                            </thead>\n                            <tbody>\n                                <tr>\n                                    <td><strong>9 V</strong></td>\n                                    <td><strong>0.571</strong></td>\n                                    <td>Step-up</td>\n                                </tr>\n                                <tr>\n                                    <td><strong>12 V</strong></td>\n                                    <td><strong>0.500</strong></td>\n                                    <td>Unity</td>\n                                </tr>\n                                <tr>\n                                    <td><strong>15 V</strong></td>\n                                    <td><strong>0.444</strong></td>\n                                    <td>Step-down</td>\n                                </tr>\n                            </tbody>\n                        </table>\n                    </div>\n\n                    <!-- Key Applications -->\n                    <div class=\"mt-1\">\n                        <p class=\"text-xs font-semibold text-[#999999] uppercase tracking-widest mb-2 text-center\">Key Applications</p>\n                        <div class=\"grid grid-cols-3 gap-3 icons-container\">\n                            <div class=\"flex flex-col items-center gap-1.5 app-box-1\">\n                                <div class=\"app-icon-box\"><i class=\"fas fa-solar-panel text-2xl text-[#DA7756]\"></i></div>\n                                <span class=\"text-xs font-semibold text-[#666666] text-center leading-tight\">Renewable<br>Energy<br><span class=\"text-[10px] opacity-70\">Solar/wind MPPT</span></span>\n                            </div>\n                            <div class=\"flex flex-col items-center gap-1.5 app-box-2\">\n                                <div class=\"app-icon-box\"><i class=\"fas fa-car-battery text-2xl text-[#DA7756]\"></i></div>\n                                <span class=\"text-xs font-semibold text-[#666666] text-center leading-tight\">Battery<br>Systems<br><span class=\"text-[10px] opacity-70\">EV, portable</span></span>\n                            </div>\n                            <div class=\"flex flex-col items-center gap-1.5 app-box-3\">\n                                <div class=\"app-icon-box\"><i class=\"fas fa-industry text-2xl text-[#DA7756]\"></i></div>\n                                <span class=\"text-xs font-semibold text-[#666666] text-center leading-tight\">Industrial<br>Power<br><span class=\"text-[10px] opacity-70\">Automation</span></span>\n                            </div>\n                        </div>\n                    </div>\n                </div>\n            </main>\n\n            <!-- Footer -->\n            <footer class=\"flex-shrink-0 flex justify-between items-center text-sm text-[#999999] pt-3 border-t border-[#E0E0E0] mt-3\">\n                <span id=\"footer\">UniMAP FYP · Jeevanjeet Singh (221091048) · PM Dr. Leong Jenn Hwai</span>\n                <span id=\"page-number\">03</span>\n            </footer>\n        </div>\n    </div>\n\n    <script>\n        window.onload = () => {\n            const tl = gsap.timeline();\n            \n            // Title expands with pulse (0.3s)\n            tl.fromTo(\"#page-title\", \n                { scale: 0.5, opacity: 0 }, \n                { \n                    scale: 1, \n                    opacity: 1, \n                    duration: 0.5, \n                    ease: \"elastic.out(1, 0.5)\",\n                    onComplete: function() {\n                        gsap.to(\"#page-title\", {\n                            scale: 1.05,\n                            duration: 0.2,\n                            yoyo: true,\n                            repeat: 1,\n                            ease: \"power2.inOut\"\n                        });\n                    }\n                }, \n                0.3\n            );\n            \n            tl.fromTo(\".accent-bar\", \n                { scaleX: 0, transformOrigin: \"left\" }, \n                { scaleX: 1, duration: 0.4, ease: \"power2.out\" }, \n                0.5\n            );\n\n            // Block diagram zooms with rotation (0.6s)\n            tl.fromTo(\".diagram-container\", \n                { \n                    scale: 0.3, \n                    opacity: 0, \n                    rotation: -15,\n                    boxShadow: \"0 0 0 rgba(0,0,0,0)\"\n                }, \n                { \n                    scale: 1, \n /* SDG Icon Pulse Animation */\n        .sdg-icon-animate {\n            animation-delay: 2.0s;\n        }\n        \n        /* Research Question Glow Animation */\n        .research-question-animate {\n            animation-delay: 2.3s;\n        }\n        \n        /* Hover Effects */\n        .problem-card {\n            transition: transform 0.3s ease, box-shadow 0.3s ease;\n        }\n        \n        .problem-card:hover {\n            transform: translateY(-4px);\n            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);\n        }\n    </style>\n</head>\n<body class=\"min-h-screen flex items-center justify-center bg-[#FAF9F6]\">\n    <div class=\"slide-container relative flex flex-col w-[1280px] h-[720px] max-w-[1280px] max-h-[720px] aspect-[16/9] overflow-hidden bg-[#FAF9F6]\">\n        <!-- Content -->\n        <div class=\"relative z-10 flex flex-col flex-grow p-[60px]\">\n            <!-- Header -->\n            <header class=\"flex-shrink-0 pb-3\">\n                <h1 class=\"text-4xl font-semibold text-[#000000] animate-fade-in header-animate\">Problem Statement &amp; Research Gap</h1>\n                <!-- Decorative Element: Accent Bar with Draw Animation -->\n                <div class=\"w-16 h-0.5 bg-[#DA7756] mt-3 animate-underline-draw underline-animate\"></div>\n            </header>\n            \n            <!-- Main Content -->\n            <main class=\"flex-grow flex flex-col justify-center min-h-0 py-2\">\n                <!-- Problem Cards Grid -->\n                <div class=\"grid grid-cols-2 gap-4 mb-5\">\n                    <!-- Card 1: Power Losses Degrade System Performance -->\n                    <div class=\"problem-card bg-white rounded-lg shadow-sm p-4 border-l-4 border-[#DA7756] animate-slide-in-left-scale card-1\">\n                        <div class=\"flex items-start gap-3\">\n                            <div class=\"w-10 h-10 bg-[#F5E6E0] rounded-lg flex items-center justify-center flex-shrink-0\">\n                                <i class=\"fas fa-fire text-base text-[#DA7756]\"></i>\n                            </div>\n                            <div class=\"flex-1\">\n                                <div class=\"flex items-center gap-2 mb-1.5\">\n                                    <span class=\"text-sm font-bold text-[#DA7756]\">01</span>\n                                    <h3 class=\"text-base font-semibold text-[#000000]\">Power Losses Degrade System Performance</h3>\n                                </div>\n                                <p class=\"text-[13.5px] text-[#666666] leading-relaxed\">\n                                    Power losses in DC-DC converters are dissipated as heat, reducing efficiency, raising component temperatures, causing thermal stress, and shortening converter lifetime and reliability [Ref. 10,11]. In battery/renewable systems, excessive losses reduce usable energy delivered to the load [Ref. 12].\n                                </p>\n                            </div>\n                        </div>\n                    </div>\n\n                    <!-- Card 2: SEPIC and ZETA Have Different Internal Topologies -->\n                    <div class=\"problem-card bg-white rounded-lg shadow-sm p-4 border-l-4 border-[#5B9BD5] animate-slide-in-left-scale card-2\">\n                        <div class=\"flex items-start gap-3\">\n                            <div class=\"w-10 h-10 bg-[#E8F2FA] rounded-lg flex items-center justify-center flex-shrink-0\">\n                                <i class=\"fas fa-project-diagram text-base text-[#5B9BD5]\"></i>\n                            </div>\n                            <div class=\"flex-1\">\n                                <div class=\"flex items-center gap-2 mb-1.5\">\n                                    <span class=\"text-sm font-bold text-[#5B9BD5]\">02</span>\n                                    <h3 class=\"text-base font-semibold text-[#000000]\">SEPIC and ZETA Have Different Internal Topologies</h3>\n                                </div>\n                                <p class=\"text-[13.5px] text-[#666666] leading-relaxed\">\n                                    Despite identical voltage gain V<sub>o</sub>/V<sub>in</sub> = D/(1−D), SEPIC and ZETA differ in: current flow pathways (continuous vs discontinuous input), voltage stress distribution, ripple patterns, and power loss distributions. These structural differences mean overall efficiency may vary even at identical operating points.\n                                </p>\n                            </div>\n                        </div>\n                    </div>\n\n                    <!-- Card 3: Research Gap — No Detailed Component-Level Comparison -->\n                    <div class=\"problem-card bg-white rounded-lg shadow-sm p-4 border-l-4 border-[#B8C5B0] animate-slide-in-left-scale card-3\">\n                        <div class=\"flex items-start gap-3\">\n                            <div class=\"w-10 h-10 bg-[#F0F4ED] rounded-lg flex items-center justify-center flex-shrink-0\">\n                                <i class=\"fas fa-search text-base text-[#B8C5B0]\"></i>\n                            </div>\n                            <div class=\"flex-1\">\n                                <div class=\"flex items-center gap-2 mb-1.5\">\n                                    <span class=\"text-sm font-bold text-[#B8C5B0]\">03</span>\n                                    <h3 class=\"text-base font-semibold text-[#000000]\">Research Gap — No Detailed Component-Level Comparison</h3>\n                                </div>\n                                <p class=\"text-[13.5px] text-[#666666] leading-relaxed\">\n                                    Prior studies (Sharma et al. [10], Boonraksa et al. [15]) focused on general efficiency or specific applications. Few provide a thorough component-level loss breakdown comparing SEPIC vs ZETA under identical operating conditions. This FYP addresses that gap directly.\n                                </p>\n                            </div>\n                        </div>\n                    </div>\n\n                    <!-- Card 4: SDG 7 — Affordable and Clean Energy -->\n                    <div class=\"problem-card bg-white rounded-lg shadow-sm p-4 border-l-4 border-[#2E5C8A] animate-slide-in-left-scale card-4\">\n                        <div class=\"flex items-start gap-3\">\n                            <div class=\"w-10 h-10 bg-[#E5EDF4] rounded-lg flex items-center justify-center flex-shrink-0 animate-pulse sdg-icon-animate\">\n                                <i class=\"fas fa-leaf text-base text-[#2E5C8A]\"></i>\n                            </div>\n                            <div class=\"flex-1\">\n                                <div class=\"flex items-center gap-2 mb-1.5\">\n                                    <span class=\"text-sm font-bold text-[#2E5C8A]\">04</span>\n                                    <h3 class=\"text-base font-semibold text-[#000000]\">SDG 7 — Affordable and Clean Energy</h3>\n                                </div>\n                                <p class=\"text-[13.5px] text-[#666666] leading-relaxed\">\n                                    Reducing power conversion losses directly improves energy efficiency and minimises waste. Identifying the more efficient topology supports more reliable renewable energy systems and sustainable electrical energy conversion [Ref. 14,15]. This research is aligned with SDG 7 goals.\n                                </p>\n                            </div>\n                        </div>\n                    </div>\n                </div>\n\n                <!-- Research Question Callout with Glow Effect -->\n                <div class=\"bg-gradient-to-r from-[#F5E6E0] to-[#E8F2FA] rounded-xl p-4 border-l-4 border-[#DA7756] animate-glow-highlight research-question-animate\">\n                    <div class=\"flex items-center gap-4\">\n                        <div class=\"w-12 h-12 bg-[#2E5C8A] rounded-full flex items-center justify-center flex-shrink-0\">\n                            <i class=\"fas fa-lightbulb text-xl text-white\"></i>\n                        </div>\n                        <div class=\"flex-1\">\n                            <p class=\"text-xs font-bold text-[#DA7756] uppercase tracking-wide mb-1\">Research Question</p>\n                            <p class=\"text-base text-[#000000] font-semibold leading-snug\">\n                                Which converter — SEPIC or ZETA — achieves higher efficiency, lower component-level losses, and better power quality under identical operating conditions?\n                            </p>\n                        </div>\n                    </div>\n                </div>\n            </main>\n\n            <!-- Footer -->\n            <footer class=\"flex-shrink-0 flex justify-between items-center text-sm text-[#999999] pt-3 border-t border-[#E0E0E0] mt-2\">\n                <!-- Presentation Title -->\n                <span id=\"footer\">UniMAP FYP · Jeevanjeet Singh (221091048) · PM Dr. Leong Jenn Hwai</span>\n                <!-- Page Number -->\n                <span id=\"page-number\">04</span>\n            </footer>\n        </div>\n    </div>\n\n</body></html>","<!DOCTYPE html><html lang=\"en\"><head>\n    <meta charset=\"utf-8\">\n    <meta content=\"width=1280, initial-scale=1.0\" name=\"viewport\">\n    <title>Research Objectives</title>\n    <script src=\"assets/0e205e71e3e4.js\"><\/script>\n    <link href=\"assets/2e567bec48f9.css\" rel=\"stylesheet\">\n    <style>\n        body { \n            font-family: 'Crimson Pro', Georgia, serif;\n        }\n        \n        /* Enhanced Animation Keyframes */\n        @keyframes zoomFadeIn {\n            from {\n                opacity: 0;\n                transform: scale(0.8);\n            }\n            to {\n                opacity: 1;\n                transform: scale(1);\n            }\n        }\n ity: 1;\n            }\n        }\n        \n        /* Animation Classes */\n        .animate-zoom-fade-in {\n            animation: zoomFadeIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;\n            opacity: 0;\n        }\n        \n        .animate-slide-in-right {\n            animation: slideInRight 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;\n            opacity: 0;\n        }\n        \n        .animate-slide-in-left {\n            animation: slideInLeft 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;\n            opacity: 0;\n        }\n        \n        .animate-fade-in {\n            animation: fadeIn 0.6s ease-out forwards;\n            opacity: 0;\n        }\n        \n        .animate-number-highlight {\n            animation: numberHighlight 1.2s ease-out forwards;\n            animation-delay: 0.8s;\n        }\n        \n        .animate-icon-bounce {\n            animation: iconBounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;\n            animation-delay: 1.3s;\n        }\n        \n        .animate-emphasis-glow {\n            animation: emphasisGlow 1.5s ease-out forwards;\n            animation-delay: 1.8s;\n        }\n        \n        /* Animation Delays */\n        .delay-300 {\n            animation-delay: 0.3s;\n        }\n        \n        .delay-600 {\n            animation-delay: 0.6s;\n        }\n        \n        .delay-1100 {\n            animation-delay: 1.1s;\n        }\n        \n        .delay-1600 {\n            animation-delay: 1.6s;\n        }\n        \n        .delay-2100 {\n            animation-delay: 2.1s;\n        }\n        \n        /* Hover Effects */\n        .objective-card {\n            transition: transform 0.3s ease, box-shadow 0.3s ease;\n        }\n        \n        .objective-card:hover {\n            transform: translateY(-4px);\n            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);\n        }\n    </style>\n</head>\n<body class=\"min-h-screen flex items-center justify-center bg-[#FAF9F6]\">\n    <div class=\"slide-container relative flex flex-col w-[1280px] h-[720px] max-w-[1280px] max-h-[720px] aspect-[16/9] overflow-hidden bg-[#FAF9F6]\">\n        <!-- Content -->\n        <div class=\"relative z-10 flex flex-col flex-grow p-[60px]\">\n            <!-- Header -->\n            <header class=\"flex-shrink-0 pb-3 animate-zoom-fade-in delay-300\">\n                <h1 class=\"text-4xl font-semibold text-[#000000]\">Research Objectives</h1>\n                <!-- Decorative Element: Accent Bar -->\n                <div class=\"w-16 h-0.5 bg-[#DA7756] mt-3\"></div>\n            </header>\n            \n            <!-- Main Content -->\n            <main class=\"flex-grow flex flex-col justify-center min-h-0 py-2\">\n                <div class=\"w-full max-w-[1100px] mx-auto space-y-5\">\n                    <!-- Objective 001 -->\n                    <div class=\"flex items-start gap-4 animate-slide-in-right delay-600 objective-card\">\n                        <div class=\"w-14 h-14 bg-[#DA7756] rounded-xl flex items-center justify-center flex-shrink-0 animate-number-highlight\">\n                            <span class=\"text-lg font-bold text-white\">001</span>\n                        </div>\n                        <div class=\"flex-1 pt-1\">\n                            <h3 class=\"text-[17px] font-semibold text-[#000000] mb-1.5\">Develop PSIM Simulation Models</h3>\n                            <p class=\"text-[14px] text-[#666666] leading-relaxed\">\n                                Develop Level-2 physics-based PSIM circuit simulation models for both SEPIC and ZETA converters using identical component parameters. Verify Continuous Conduction Mode (CCM) operation using inductor current waveforms at all 9 operating points (V<sub>in</sub> = 9/12/15V, I<sub>o</sub> = 0.5/1.0/1.5A). Gate resistance R<sub>g</sub> = 33Ω to match analytical gate current of 0.3A.\n                            </p>\n                        </div>\n                    </div>\n                    \n                    <!-- Objective 002 -->\n                    <div class=\"flex items-start gap-4 animate-slide-in-left delay-1100 objective-card\">\n                        <div class=\"w-14 h-14 bg-[#5B9BD5] rounded-xl flex items-center justify-center flex-shrink-0 animate-icon-bounce\">\n                            <span class=\"text-lg font-bold text-white\">002</span>\n                        </div>\n                        <div class=\"flex-1 pt-1\">\n                            <h3 class=\"text-[17px] font-semibold text-[#000000] mb-1.5\">Develop MATLAB Analytical Loss Models</h3>\n                            <p class=\"text-[14px] text-[#666666] leading-relaxed\">\n                                Develop first-order non-ideal MATLAB analytical models with electro-thermal iteration (R<sub>θJA</sub> = 62°C/W, T<sub>amb</sub> = 40°C) estimating: MOSFET switching loss (P<sub>sw</sub>), MOSFET conduction loss (P<sub>cond</sub>), gate drive loss (P<sub>gate</sub> = V<sub>gate</sub>·Q<sub>g</sub>·f<sub>s</sub> = 0.163W fixed), diode conduction + capacitance loss, inductor DCR copper loss, and capacitor ESR loss. Iteratively update R<sub>DS(on)</sub> with junction temperature.\n                            </p>\n                        </div>\n                    </div>\n                    \n                    <!-- Objective 003 -->\n                    <div class=\"flex items-start gap-4 animate-slide-in-right delay-1600 objective-card\">\n                        <div class=\"w-14 h-14 bg-[#B8C5B0] rounded-xl flex items-center justify-center flex-shrink-0 animate-emphasis-glow\">\n                            <span class=\"text-lg font-bold text-white\">003</span>\n                        </div>\n                        <div class=\"flex-1 pt-1\">\n                            <h3 class=\"text-[17px] font-semibold text-[#000000] mb-1.5\">Compare Both Topologies Across All 9 Operating Points</h3>\n                            <p class=\"text-[14px] text-[#666666] leading-relaxed\">\n                                Compare SEPIC vs ZETA for: output voltage regulation (V<sub>o</sub> error %), CCM verification, component-level loss distribution (W and %), stage efficiency, system efficiency (including gate drive), junction temperature T<sub>j</sub> (°C), output voltage ripple ΔV<sub>o</sub> (mV), and topology-specific trade-offs. Nine conditions: 3 input voltages × 3 load currents = 9 points.\n                            </p>\n                        </div>\n                    </div>\n                    \n                    <!-- Roadmap Diagram -->\n                    <div class=\"mt-5 pt-4 border-t border-[#E0E0E0] animate-fade-in delay-2100\">\n                        <div class=\"flex items-center justify-center gap-3\">\n                            <div class=\"flex items-center gap-2.5\">\n                                <div class=\"w-12 h-12 bg-[#DA7756] rounded-lg flex items-center justify-center\">\n                                    <span class=\"text-[15px] font-bold text-white\">001</span>\n                                </div>\n                                <span class=\"text-[13px] font-medium text-[#666666]\">PSIM Models<br><span class=\"text-[11px] text-[#999999]\">CCM Verification</span></span>\n                            </div>\n                            \n                            <div class=\"flex items-center\">\n                                <svg class=\"w-7 h-7 text-[#DA7756]\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" viewBox=\"0 0 24 24\">\n                                    <path stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M13 7l5 5m0 0l-5 5m5-5H6\"></path>\n                                </svg>\n                            </div>\n                            \n                            <div class=\"flex items-center gap-2.5\">\n                                <div class=\"w-12 h-12 bg-[#5B9BD5] rounded-lg flex items-center justify-center\">\n                                    <span class=\"text-[15px] font-bold text-white\">002</span>\n                                </div>\n                                <span class=\"text-[13px] font-medium text-[#666666]\">MATLAB Analysis<br><span class=\"text-[11px] text-[#999999]\">Loss Estimation</span></span>\n                            </div>\n                            \n                            <div class=\"flex items-center\">\n                                <svg class=\"w-7 h-7 text-[#5B9BD5]\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" viewBox=\"0 0 24 24\">\n                                    <path stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M13 7l5 5m0 0l-5 5m5-5H6\"></path>\n                                </svg>\n                            </div>\n                            \n                            <div class=\"flex items-center gap-2.5\">\n                                <div class=\"w-12 h-12 bg-[#B8C5B0] rounded-lg flex items-center justify-center\">\n                                    <span class=\"text-[15px] font-bold text-white\">003</span>\n                                </div>\n                                <span class=\"text-[13px] font-medium text-[#666666]\">Comparison<br><span class=\"text-[11px] text-[#999999]\">9 Operating Points</span></span>\n                            </div>\n                        </div>\n                    </div>\n                </div>\n            </main>\n            \n            <!-- Footer -->\n            <footer class=\"flex-shrink-0 flex justify-between items-center text-base text-[#999999] pt-3 border-t border-[#E0E0E0] mt-2\">\n                <!-- Presentation Title -->\n                <span id=\"footer\">UniMAP FYP · Jeevanjeet Singh (221091048) · PM Dr. Leong Jenn Hwai</span>\n                <!-- Page Number -->\n                <span id=\"page-number\">05</span>\n            </footer>\n        </div>\n    </div>\n\n</body></html>","<!DOCTYPE html><h mlns=\"http://www.w3.org/2000/svg\">\n                    <!-- Left Arrow -->\n                    <path class=\"animate-arrow\" d=\"M 20 50 L 40 50\" stroke=\"#DA7756\" stroke-width=\"2\" fill=\"none\" marker-end=\"url(#arrowhead-left)\"></path>\n                    <!-- Right Arrow -->\n                    <path class=\"animate-arrow\" d=\"M 60 50 L 80 50\" stroke=\"#DA7756\" stroke-width=\"2\" fill=\"none\" marker-end=\"url(#arrowhead-right)\" style=\"animation-delay: 1.4s;\"></path>\n                    \n                    <defs>\n                        <marker id=\"arrowhead-left\" markerWidth=\"10\" markerHeight=\"10\" refX=\"9\" refY=\"3\" orient=\"auto\">\n                            <polygon points=\"0 0, 10 3, 0 6\" fill=\"#DA7756\"></polygon>\n                        </marker>\n                        <marker id=\"arrowhead-right\" markerWidth=\"10\" markerHeight=\"10\" refX=\"9\" refY=\"3\" orient=\"auto\">\n                            <polygon points=\"0 0, 10 3, 0 6\" fill=\"#DA7756\"></polygon>\n                        </marker>\n                    </defs>\n                </svg>\n                \n                <!-- SEPIC Column -->\n                <div class=\"flex-1 flex flex-col min-h-0 animate-sepic\">\n                    <div class=\"topology-box overflow-y-auto\">\n                        <div class=\"section-title animate-circuit-sepic\">SEPIC Converter</div>\n                        <div class=\"text-center text-xs text-[#666666] italic mb-3 animate-circuit-sepic\">Single-Ended Primary-Inductor Converter</div>\n                        \n                        <div class=\"animate-circuit-sepic\">\n                            <div class=\"subsection-title\">Components:</div>\n                            <div class=\"text-center mb-2\">\n                                <span class=\"component-tag tag-inductor\">L₁ (input-side)</span>\n                                <span class=\"component-tag tag-inductor\">L₂ (floating)</span>\n ature-item\">MOSFET source is floating (V<sub>GS</sub> must be referenced: V<sub>g</sub> − V<sub>s</sub>)</div>\n                        </div>\n                        \n                        <div class=\"highlight-box animate-circuit-sepic\" style=\"animation-delay: 1.4s;\">\n                            <div class=\"text-sm font-semibold text-[#1a2a4a]\">Voltage Transfer Ratio (CCM):</div>\n                            <div class=\"text-base font-bold text-[#DA7756] text-center mt-1\">V<sub>o</sub>/V<sub>in</sub> = D/(1−D)</div>\n                        </div>\n                    </div>\n                </div>\n                \n                <!-- ZETA Column -->\n                <div class=\"flex-1 flex flex-col min-h-0 animate-zeta\">\n                    <div class=\"topology-box overflow-y-auto\">\n                        <div class=\"section-title animate-circuit-zeta\">ZETA Converter</div>\n                        <div class=\"text-center text-xs text-[#666666] italic mb-3 animate-circuit-zeta\">Inverse-SEPIC / ZETA Topology</div>\n                        \n                        <div class=\"animate-circuit-zeta\">\n                            <div class=\"subsection-title\">Components:</div>\n                            <div class=\"text-center mb-2\">\n                                <span class=\"component-tag tag-inductor\">L₁ (input-side)</span>\n                                <span class=\"component-tag tag-inductor\">L₂ (output, series with load)</span>\n                                <span class=\"component-tag tag-capacitor\">Cc (coupling, 15µF)</span>\n                                <span class=\"component-tag tag-capacitor\">Cin (27µF)</span>\n                                <span class=\"component-tag tag-capacitor\">Cout (1µF)</span>\n                                <span class=\"component-tag tag-semiconductor\">Q₁</span>\n                                <span class=\"component-tag tag-semiconductor\">D₁</span>\n x rgba(218, 119, 86, 0.4);\n            }\n            100% {\n                opacity: 1;\n                transform: scale(1);\n                box-shadow: 0 4px 12px rgba(218, 119, 86, 0.5);\n            }\n        }\n        \n        @keyframes titleZoom {\n            from {\n                opacity: 0;\n                transform: scale(0.8);\n            }\n            to {\n                opacity: 1;\n                transform: scale(1);\n            }\n        }\n        \n        @keyframes slideFromTopLeft {\n            from {\n                opacity: 0;\n                transform: translate(-60px, -60px) rotate(-5deg);\n            }\n            to {\n                opacity: 1;\n                transform: translate(0, 0) rotate(0deg);\n            }\n        }\n        \n        @keyframes slideFromTopRight {\n            from {\n                opacity: 0;\n                transform: translate(60px, -60px) rotate(5deg);\n            }\n            to {\n                opacity: 1;\n                transform: translate(0, 0) rotate(0deg);\n            }\n        }\n        \n        @keyframes slideFromLeft {\n            from {\n                opacity: 0;\n                transform: translateX(-80px) scale(0.9);\n            }\n            to {\n                opacity: 1;\n                transform: translateX(0) scale(1);\n            }\n        }\n        \n        @keyframes slideFromRight {\n            from {\n                opacity: 0;\n                transform: translateX(80px) scale(0.9);\n            }\n            to {\n                opacity: 1;\n                transform: translateX(0) scale(1);\n            }\n        }\n        \n        @keyframes slideFromBottomLeft {\n            from {\n                opacity: 0;\n                transform: translate(-60px, 60px) rotate(-5deg);\n            }\n            to {\n                opacity: 1;\n                transform: translate(0, 0) rotate(0deg);\n            }\n        }\n        \n        @keyframes slideFromBottomRight {\n            from {\n                opacity: 0;\n                transform: translate(60px, 60px) rotate(5deg);\n            }\n            to {\n                opacity: 1;\n                transform: translate(0, 0) rotate(0deg);\n            }\n        }\n        \n        /* Title Animation */\n        header {\n            opacity: 0;\n            animation: titleZoom 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;\n            animation-delay: 0.3s;\n        }\n        \n        /* Cascading Reveal Animations for Loss Cards */\n        .loss-card:nth-child(1) {\n            animation: slideFromTopLeft 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;\n            animation-delay: 0.5s;\n        }\n        \n        .loss-card:nth-child(2) {\n            animation: slideFromTopRight 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;\n            animation-delay: 0.7s;\n        }\n        \n        .loss-card:nth-child(3) {\n            animation: slideFromLeft 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;\n            animation-delay: 0.9s;\n        }\n        \n        .loss-card:nth-child(4) {\n            animation: slideFromRight 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;\n            animation-delay: 1.1s;\n        }\n        \n        .loss-card:nth-child(5) {\n            animation: slideFromBottomLeft 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;\n            animation-delay: 1.3s;\n        }\n        \n        .loss-card:nth-child(6) {\n            animation: slideFromBottomRight 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;\n            animation-delay: 1.5s;\n        }\n        \n        /* Equation box highlight animation triggers */\n        .loss-card:nth-child(1) .equation-box::after {\n            animation-delay: 0.8s;\n        }\n        .loss-card:nth-child(2) .equation-box::after {\n            animation-delay: 1.0s;\n        }\n        .loss-card:nth-child(3) .equation-box::after {\n            animation-delay: 1.2s;\n        }\n        .loss-card:nth-child(4) .equation-box::after {\n            animation-delay: 1.4s;\n        }\n        .loss-card:nth-child(5) .equation-box::after {\n            animation-delay: 1.6s;\n        }\n        .loss-card:nth-child(6) .equation-box::after {\n            animation-delay: 1.8s;\n        }\n    </style>\n</head>\n<body class=\"min-h-screen flex items-center justify-center bg-[#FAF9F6]\">\n    <div class=\"slide-container relative flex flex-col w-[1280px] h-[720px] max-w-[1280px] max-h-[720px] aspect-[16/9] overflow-hidden bg-[#FAF9F6]\">\n        <!-- Content -->\n        <div class=\"relative z-10 flex flex-col flex-grow p-[50px_60px_45px_60px]\">\n            <!-- Header -->\n            <header class=\"flex-shrink-0 pb-3\">\n                <h1 class=\"text-[32px] font-semibold text-[#000000]\">Power Loss Equations — Full Analytical Model (Table 3.6)</h1>\n                <div class=\"w-16 h-0.5 bg-[#DA7756] mt-2\"></div>\n            </header>\n            \n            <!-- Main Content: 6 Loss Mechanisms in 2 rows × 3 columns -->\n            <main class=\"flex-grow grid grid-cols-3 gap-4 min-h-0 py-3\">\n                <!-- Card 1: MOSFET Switching -->\n                <div class=\"loss-card\">\n                    <div class=\"loss-title\">\n                        <i class=\"fas fa-bolt text-[#DA7756]\"></i>\n                        MOSFET Switching\n                    </div>\n                    <div class=\"equation-box\">\n                        P<sub>sw</sub> = ½·(V<sub>in</sub>+V<sub>o</sub>)·I<sub>sw,peak</sub>·t<sub>sw</sub>·f<sub>s</sub><br>\n                        t<sub>sw</sub> = Q<sub>gd</sub> / I<sub>g</sub>\n                    </div>\n                    <div class=\"detail-text\">\n                        <span class=\"highlight\">Dominant 48–55%</span><br>\n                        t<sub>sw</sub> = 25nC/0.3A = 83ns (datasheet model)<br>\n                        <span class=\"highlight\">Refined: 22–30ns</span> from PSIM waveforms\n                    </div>\n                </div>\n\n                <!-- Card 2: MOSFET Conduction -->\n                <div class=\"loss-card\">\n                    <div class=\"loss-title\">\n                        <i class=\"fas fa-microchip text-[#DA7756]\"></i>\n                        MOSFET Conduction\n                    </div>\n                    <div class=\"equation-box\">\n                        P<sub>cond</sub> = I<sub>MOS,rms</sub>² × R<sub>DS(on)</sub><br>\n                        R<sub>DS(on)</sub> temp-dep\n                    </div>\n                    <div class=\"detail-text\">\n                        I<sub>MOS,rms</sub> includes both inductor currents combined.<br>\n                        Updated each thermal iteration\n                    </div>\n                </div>\n\n                <!-- Card 3: Gate Drive (Fixed) -->\n                <div class=\"loss-card\">\n                    <div class=\"loss-title\">\n                        <i class=\"fas fa-power-off text-[#DA7756]\"></i>\n                        Gate Drive (Fixed)\n                    </div>\n                    <div class=\"equation-box\">\n                        P<sub>gate</sub> = V<sub>gate</sub> × Q<sub>g</sub> × f<sub>s</sub><br>\n                        = 10 × 48n × 340k\n                    </div>\n                    <div class=\"detail-text\">\n                        <span class=\"highlight\">= 0.1632 W</span><br>\n                        Constant at ALL operating points.<br>\n                        Dominant at light load <span class=\"highlight\">(16%)</span>\n                    </div>\n                </div>\n\n                <!-- Card 4: Diode Conduction -->\n                <div class=\"loss-card\">\n                    <div class=\"loss-title\">\n                        <i class=\"fas fa-arrow-right text-[#DA7756]\"></i>\n                        Diode Conduction\n                    </div>\n                    <div class=\"equation-box\">\n                        P<sub>D</sub> = V<sub>F</sub>·I<sub>D,avg</sub> + I<sub>D,rms</sub>²·R<sub>F</sub><br>\n                        + ½C<sub>j</sub>·V<sub>sw</sub>²·f<sub>s</sub>\n                    </div>\n                    <div class=\"detail-text\">\n                        V<sub>F</sub> = 0.5V, C<sub>j</sub> = 250pF<br>\n                        Capacitive term:<br>\n                        ½×250p×21²×340k ≈ <span class=\"highlight\">0.0195W</span>\n                    </div>\n                </div>\n\n                <!-- Card 5: Inductor Copper -->\n                <div class=\"loss-card\">\n                    <div class=\"loss-title\">\n                        <i class=\"fas fa-circle-notch text-[#DA7756]\"></i>\n                        Inductor Copper\n                    </div>\n                    <div class=\"equation-box\">\n                        P<sub>L</sub> = I<sub>L,rms</sub>² × DCR<br>\n                        (L1 &amp; L2 separately)\n                    </div>\n                    <div class=\"detail-text\">\n                        DCR = 50mΩ each<br>\n                        9V/1.5A worst:<br>\n                        L1: 0.2725W, L2: 0.1125W<br>\n                        <span class=\"highlight\">Total: 0.385W</span>\n                    </div>\n                </div>\n\n                <!-- Card 6: Capacitor ESR -->\n                <div class=\"loss-card\">\n                    <div class=\"loss-title\">\n                        <i class=\"fas fa-battery-half text-[#DA7756]\"></i>\n                        Capacitor ESR\n                    </div>\n                    <div class=\"equation-box\">\n                        P<sub>C</sub> = I<sub>C,rms</sub>² × ESR<br>\n                        (all caps modelled)\n                    </div>\n                    <div class=\"detail-text\">\n                        ESR = 10mΩ<br>\n                        <span class=\"highlight\">ZETA: C<sub>in</sub> ESR adds 0.11W</span><br>\n                        (absent in SEPIC)<br>\n                        <span class=\"highlight\">Key differentiator!</span>\n                    </div>\n                </div>\n            </main>\n            \n            <!-- Bottom Formula -->\n            <div class=\"flex-shrink-0 mt-3\">\n                <div class=\"bottom-formula\">\n                    P<sub>total</sub> = P<sub>sw</sub> + P<sub>cond</sub> + P<sub>gate</sub> + P<sub>diode</sub> + P<sub>L1</sub> + P<sub>L2</sub> + P<sub>C_ESR</sub> &nbsp;&nbsp;|&nbsp;&nbsp; η = P<sub>out</sub>/(P<sub>out</sub> + P<sub>total</sub>) × 100%\n                </div>\n            </div>\n            \n            <!-- Footer -->\n            <footer class=\"flex-shrink-0 flex justify-between items-center text-base text-[#999999] pt-3 mt-2\">\n                <span id=\"footer\">UniMAP FYP · Jeevanjeet Singh (221091048) · PM Dr. Leong Jenn Hwai</span>\n                <span id=\"page-number\">08</span>\n            </footer>\n        </div>\n    </div>\n\n</body></html>","<!DOCTYPE html><html lang=\"en\"><head>\n    <meta charset=\"utf-8\">\n    <meta content=\"width=1280, initial-scale=1.0\" name=\"viewport\">\n    <title>Component Selection</title>\n    <script src=\"assets/0e205e71e3e4.js\"><\/script>\n    <link href=\"assets/2e567bec48f9.css\" rel=\"stylesheet\">\n    <style>\n        body { \n            font-family: 'Crimson Pro', Georgia, serif;\n        }\n        table {\n            border-collapse: collapse;\n            width: 100%;\n        }\n        th, td {\n            border: 1px solid #E0E0E0;\n            padding: 6px 10px;\n            text-align: left;\n        }\n        th {\n            background-color: #F5E6E0;\n            font-weight: 600;\n        }\n        tr:nth-child(even) {\n            background-color: #FAFAFA;\n        }\n        \n        /* Enhanced Animation Keyframes */\n        @keyframes fadeIn {\n            from {\n                op  animation-delay: 2.2s;\n        }\n        \n        .highlight-delay-4 {\n            animation-delay: 2.4s;\n        }\n    </style>\n</head>\n<body class=\"min-h-screen flex items-center justify-center bg-[#FAF9F6]\">\n    <div class=\"slide-container relative flex flex-col w-[1280px] h-[720px] max-w-[1280px] max-h-[720px] aspect-[16/9] overflow-hidden bg-[#FAF9F6]\">\n        <!-- Content -->\n        <div class=\"relative z-10 flex flex-col flex-grow p-[60px]\">\n            <!-- Header -->\n            <header class=\"flex-shrink-0 pb-3 animate-fade-in delay-300\">\n                <h1 class=\"text-4xl font-semibold text-[#000000]\">Component Selection &amp; PSIM Model Development</h1>\n                <!-- Decorative Element: Accent Bar -->\n                <div class=\"w-16 h-0.5 bg-[#DA7756] mt-3\"></div>\n            </header>\n            \n            <!-- Main Content -->\n            <main class=\"flex-grow flex flex-col justify-center min-h-0 py-2\">\n                <!-- Three Tables Layout -->\n                <div class=\"grid grid-cols-2 gap-5\">\n                    <!-- Left Column: MOSFET Table -->\n                    <div class=\"space-y-3 animate-flip-from-back delay-600\">\n                        <h2 class=\"text-lg font-semibold text-[#DA7756] mb-2\">MOSFET: IRLZ44NPbF (Table 3.2)</h2>\n                        <div class=\"bg-white rounded-lg shadow-sm border border-[#E0E0E0] overflow-hidden\">\n                            <table class=\"text-sm\">\n                                <thead>\n                                    <tr>\n                                        <th class=\"text-[#000000]\">Parameter</th>\n                                        <th class=\"text-[#000000]\">Symbol</th>\n                                        <th class=\"text-[#000000]\">Value</th>\n                                    </tr>\n                                </thead>\n                                <tbody class=\"text-[#333333]\">\n                                    <tr>\n                                        <td>MOSFET model</td>\n                                        <td>—</td>\n                                        <td class=\"font-semibold\">IRLZ44NPbF</td>\n                                    </tr>\n                                    <tr>\n                                        <td>Drain-source voltage rating</td>\n                                        <td>V<sub>DS</sub></td>\n                                        <td>55 V</td>\n                                    </tr>\n                                    <tr>\n                                        <td>Continuous drain current</td>\n                                        <td>I<sub>D</sub></td>\n                                        <td>47 A</td>\n                                    </tr>\n                                    <tr class=\"highlight-spec highlight-delay-1\">\n                                        <td>On-state resistance</td>\n                                        <td>R<sub>DS(on)</sub></td>\n                                        <td class=\"font-semibold text-[#DA7756]\">22 mΩ @ V<sub>GS</sub>=10V</td>\n                                    </tr>\n                                    <tr>\n                                        <td>Rise time</td>\n                                        <td>t<sub>r</sub></td>\n                                        <td>84 ns (at 25A)</td>\n                                    </tr>\n                                    <tr>\n                                        <td>Fall time</td>\n                                        <td>t<sub>f</sub></td>\n                                        <td>15 ns (at 25A)</td>\n                                    </tr>\n                                    <tr class=\"highlight-spec highlight-delay-2\">\n                                        <td>Gate charge</td>\n                                        <td>Q<sub>g</sub></td>\n ded-full bg-[#DA7756] text-white flex items-center justify-center text-sm font-semibold\">4</div>\n                                        <p class=\"text-sm text-[#333333] leading-snug pt-0.5\">MATLAB electro-thermal iteration: P<sub>loss</sub> → T<sub>j</sub> → R<sub>DS(on)</sub> → P<sub>loss</sub> (converge)</p>\n                                    </div>\n                                </div>\n                                <div class=\"step-container animate-step-5\">\n                                    <div class=\"step-line\"></div>\n                                    <div class=\"step-content flex items-start gap-3\">\n                                        <div class=\"step-number flex-shrink-0 w-7 h-7 rounded-full bg-[#DA7756] text-white flex items-center justify-center text-sm font-semibold\">5</div>\n                                        <p class=\"text-sm text-[#333333] leading-snug pt-0.5\">Calculate all loss components for all 9 operating points per topology</p>\n                                    </div>\n                                </div>\n                                <div class=\"step-container animate-step-6\">\n                                    <div class=\"step-line\"></div>\n                                    <div class=\"step-content flex items-start gap-3\">\n                                        <div class=\"step-number flex-shrink-0 w-7 h-7 rounded-full bg-[#DA7756] text-white flex items-center justify-center text-sm font-semibold\">6</div>\n                                        <p class=\"text-sm text-[#333333] leading-snug pt-0.5\">Build PSIM Level-2 models with R<sub>g</sub>=33Ω, identical parasitics to MATLAB</p>\n                                    </div>\n                                </div>\n                                <div class=\"step-container animate-step-7\">\n                                    <div class=\"step-line\"></div>\n                                    <div class=\"step-content flex items-start gap-3\">\n                                        <div class=\"step-number flex-shrink-0 w-7 h-7 rounded-full bg-[#DA7756] text-white flex items-center justify-center text-sm font-semibold\">7</div>\n                                        <p class=\"text-sm text-[#333333] leading-snug pt-0.5\">Run PSIM steady-state simulations; extract 10-cycle waveforms via Python</p>\n                                    </div>\n                                </div>\n                                <div class=\"step-container animate-step-8\">\n                                    <div class=\"step-line\"></div>\n                                    <div class=\"step-content flex items-start gap-3\">\n                                        <div class=\"step-number flex-shrink-0 w-7 h-7 rounded-full bg-[#DA7756] text-white flex items-center justify-center text-sm font-semibold\">8</div>\n                                        <p class=\"text-sm text-[#333333] leading-snug pt-0.5\">Compute PSIM efficiency, output regulation, ripple, energy closure error</p>\n                                    </div>\n                                </div>\n                                <div class=\"step-container animate-step-9\">\n                                    <div class=\"step-line\"></div>\n                                    <div class=\"step-content flex items-start gap-3\">\n                                        <div class=\"step-number flex-shrink-0 w-7 h-7 rounded-full bg-[#DA7756] text-white flex items-center justify-center text-sm font-semibold\">9</div>\n                                        <p class=\"text-sm text-[#333333] leading-snug pt-0.5\">Refine MATLAB switching loss using PSIM I<sub>turnoff</sub> &amp; t<sub>sw,eff</sub> measurements</p>\n                                    </div>\n                                </div>\n                                <div class=\"step-container animate-step-10\">\n                                    <div class=\"step-content f trong>Problem 1:</strong> t<sub>r</sub>=84ns, t<sub>f</sub>=15ns measured at I<sub>D</sub>=25A — 10–20× higher than actual operating range (1–4A)</p>\n                            <p class=\"text-[#666666] problem-highlight\"><strong>Problem 2:</strong> Uses I<sub>sw,peak</sub> = I<sub>L1,pk</sub>+I<sub>L2,pk</sub> (1.5–2× actual turn-off current at the moment of switching)</p>\n                            <p class=\"text-[#666666]\"><strong>Result:</strong> 69–87% overestimation — conservative upper-bound only</p>\n                        </div>\n                    </div>\n\n                    <!-- Right: Refined Model -->\n                    <div class=\"flex-1 bg-white rounded-lg shadow-sm p-4 border-l-4 border-[#5B9BD5] animate-box-right\">\n                        <h3 class=\"text-base font-semibold text-[#5B9BD5] mb-2\">Refined Model — PSIM-Extracted Parameters</h3>\n                        <div class=\"space-y-2 text-xs text-[#000000]\">\n                            <p class=\"font-semibold\">Formula: P<sub>sw,ref</sub> = ½·V<sub>DS</sub>·I<sub>turnoff</sub>·t<sub>sw,eff</sub>·f<sub>s</sub></p>\n                            <p class=\"text-[#666666]\"><strong>I<sub>turnoff</sub>:</strong> Actual turn-off current from PSIM (avg of 10 cycles) — 1.09–3.92A range</p>\n                            <p class=\"text-[#666666]\"><strong>t<sub>sw,eff</sub>:</strong> V<sub>DS</sub> 0–90% rise time at turn-off measured in PSIM: 22–30ns (much shorter than datasheet 99ns)</p>\n                            <p class=\"text-[#666666]\"><strong>Result:</strong> Error drops to 57–70% underestimate. Remaining gap: C<sub>oss</sub> discharge, Miller plateau, turn-on losses (all captured by PSIM V<sub>DS</sub>×I<sub>D</sub> integration but not in linear model)</p>\n                        </div>\n                    </div>\n                </div>\n            </main>\n\n            <!-- Footer -->\n            <footer class=\"flex-shrink-0 flex justify-between items-center text-sm text-[#999999] pt-3 border-t border-[#E0E0E0] mt-2\">\n                <span id=\"footer\">UniMAP FYP · Jeevanjeet Singh (221091048) · PM Dr. Leong Jenn Hwai</span>\n                <span id=\"page-number\">18</span>\n            </footer>\n        </div>\n    </div>\n\n</body></html>","<!DOCTYPE html><html lang=\"en\"><head>\n    <meta charset=\"utf-8\">\n    <meta content=\"width=1280, initial-scale=1.0\" name=\"viewport\">\n    <title>PSIM Validation - SEPIC Waveforms</title>\n    <script src=\"assets/0e205e71e3e4.js\"><\/script>\n    <link href=\"assets/2e567bec48f9.css\" rel=\"stylesheet\">\n    <style>\n        body { \n            font-family: 'Crimson Pro', Georgia, serif;\n        }\n        \n        /* Animation Keyframes */\n        @keyframes fadeIn {\n            from {\n                opacity: 0;\n                transform: translateY(20px);\n            }\n            to {\n                opacity: 1;\n                transform: translateY(0);\n            }\n        }\n        \n        @keyframes voltageSweep {\n            0% {\n                opacity: 0;\n                transform: translateX(-100%) scaleX(0);\n            }\n            50% {\n                opacity: 1;\n                transform: translateX(0) scaleX(1);\n            }\n            100% {\n                opacity: 1;\n                transform: translateX(0) scaleX(1);\n            }\n        }\n        \n        @keyframes currentFlow {\n            0% {\n                opacity: 0;\n                stroke-dashoffset: 100;\n            }\n            100% {\n                opacity: 1;\n                stroke-dashoffset: 0;\n            }\n        }\n        \n        @keyframes rippleWave {\n            0%, 100% {\n                transform: translateY(0) scaleY(1);\n                opacity: 0.3;\n            }\n            50% {\n                transform: translateY(-5px) scaleY(1.2);\n                opacity: 1;\n            }\n        }\n        \n        @keyframes pul
