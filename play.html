                 <i class=\"fas fa-check text-xs text-white\"></i>\n                                </div>\n                                <p class=\"text-sm text-[#333333] leading-snug\">PCB layout simplicity is valued — fewer capacitor bank requirements</p>\n                            </div>\n                        </div>\n                    </div>\n                    \n                    <!-- ZETA Column -->\n                    <div class=\"bg-white rounded-xl shadow-md p-5 border-l-4 border-[#5B9BD5] animate-slide-right\">\n                        <div class=\"flex items-center gap-2 mb-4\">\n                            <div class=\"w-10 h-10 bg-[#5B9BD5] rounded-lg flex items-center justify-center\">\n                                <i class=\"fas fa-bolt text-lg text-white\"></i>\n                            </div>\n                            <h2 class=\"text-xl font-bold text-[#5B9BD5]\">Choose ZETA when…</h2>\n                        </div>\n                        \n                        <div class=\"space-y-2.5\">\n                            <!-- Criterion Item 1 -->\n                            <div class=\"flex items-start gap-2 highlight-box highlight-1 rounded-md p-1.5 -m-1.5\">\n                                <div class=\"w-6 h-6 bg-[#5B9BD5] rounded-md flex items-center justify-center flex-shrink-0 mt-0.5\">\n                                    <i class=\"fas fa-star text-xs text-white\"></i>\n                                </div>\n                                <p class=\"text-sm text-[#333333] leading-snug\">Ultra-low output voltage ripple is critical (3.9–5.1mV vs 57.8mV — 11× better)</p>\n                            </div>\n                            \n                            <!-- Criterion Item 2 -->\n                            <div class=\"flex items-start gap-2 highlight-box highlight-2 rounded-md p-1.5 -m-1.5\">\n                                <div class=\"w-6 h-6 bg-[#5B9BD5] rounded-md flex items-center justify-center flex-shrink-0 mt-0.5\">\n                                    <i class=\"fas fa-star text-xs text-white\"></i>\n                                </div>\n                                <p class=\"text-sm text-[#333333] leading-snug\">Powering sensitive loads: precision analog circuits, ADCs, RF circuits, sensors</p>\n                            </div>\n                            \n                            <!-- Criterion Item 3 -->\n                            <div class=\"flex items-start gap-2 highlight-box highlight-3 rounded-md p-1.5 -m-1.5\">\n                                <div class=\"w-6 h-6 bg-[#5B9BD5] rounded-md flex items-center justify-center flex-shrink-0 mt-0.5\">\n                                    <i class=\"fas fa-star text-xs text-white\"></i>\n                                </div>\n                                <p class=\"text-sm text-[#333333] leading-snug\">Small output capacitor preferred (Cout = 1µF vs 15µF — 15× smaller, significant BOM saving)</p>\n                            </div>\n                            \n                            <!-- Criterion Item 4 -->\n                            <div class=\"flex items-start gap-2 highlight-box highlight-4 rounded-md p-1.5 -m-1.5\">\n                                <div class=\"w-6 h-6 bg-[#5B9BD5] rounded-md flex items-center justify-center flex-shrink-0 mt-0.5\">\n                                    <i class=\"fas fa-star text-xs text-white\"></i>\n                                </div>\n                                <p class=\"text-sm text-[#333333] leading-snug\">Clean, stable DC rail is more important than 0.35% efficiency difference</p>\n                            </div>\n                            \n                            <!-- Criterion Item 5 -->\n                            <div class=\"flex items-start gap-2 highlight-box highlight-5 rounded-md p-1.5 -m-1.5\">\n                                <div class=\"w-6 h-6 bg-[#5B9BD5] rounded-md flex items-center justify-center flex-shrink-0 mt-0.5\">\n                                    <i class=\"fas fa-star text-xs text-white\"></i>\n                                </div>\n                                <p class=\"text-sm text-[#333333] leading-snug\">Input current discontinuity is acceptable and EMI can be managed with input filtering</p>\n                            </div>\n                            \n                            <!-- Criterion Item 6 -->\n                            <div class=\"flex items-start gap-2 highlight-box highlight-6 rounded-md p-1.5 -m-1.5\">\n                                <div class=\"w-6 h-6 bg-[#5B9BD5] rounded-md flex items-center justify-center flex-shrink-0 mt-0.5\">\n                                    <i class=\"fas fa-star text-xs text-white\"></i>\n                                </div>\n                                <p class=\"text-sm text-[#333333] leading-snug\">Output inductor in series with load provides inherent current-limiting protection</p>\n                            </div>\n                        </div>\n                    </div>\n                </div>\n                \n                <!-- Recommendation Strip -->\n                <div class=\"grid grid-cols-2 gap-6\">\n                    <!-- SEPIC Applications -->\n                    <div class=\"bg-[#F5E6E0] rounded-lg p-4\">\n                        <div class=\"typewriter-container\">\n                            <h3 class=\"text-base font-semibold text-[#DA7756] mb-2.5 typewriter-sepic\">SEPIC Applications:</h3>\n                        </div>\n                        <div class=\"flex flex-wrap gap-1.5\">\n                            <span class=\"px-2.5 py-1 bg-white rounded-md text-xs text-[#333333] font-medium app-tag app-tag-sepic-1\">Battery management systems</span>\n                            <span class=\"px-2.5 py-1 bg-white rounded-md text-xs text-[#333333] font-medium app-tag app-tag-sepic-2\">Solar/wind MPPT</span>\n                            <span class=\"px-2.5 py-1 bg-white rounded-md text-xs text-[#333333] font-medium app-tag app-tag-sepic-3\">General-purpose DC conversion</span>\n                            <span class=\"px-2.5 py-1 bg-white rounded-md text-xs text-[#333333] font-medium app-tag app-tag-sepic-4\">EV auxiliary systems</span>\n                            <span class=\"px-2.5 py-1 bg-white rounded-md text-xs text-[#333333] font-medium app-tag app-tag-sepic-5\">Industrial automation</span>\n                            <span class=\"px-2.5 py-1 bg-white rounded-md text-xs text-[#333333] font-medium app-tag app-tag-sepic-6\">Variable-Vin battery chargers</span>\n                        </div>\n                    </div>\n                    \n                    <!-- ZETA Applications -->\n                    <div class=\"bg-[#E8F2FC] rounded-lg p-4\">\n                        <div class=\"typewriter-container\">\n                            <h3 class=\"text-base font-semibold text-[#5B9BD5] mb-2.5 typewriter-zeta\">ZETA Applications:</h3>\n                        </div>\n                        <div class=\"flex flex-wrap gap-1.5\">\n                            <span class=\"px-2.5 py-1 bg-white rounded-md text-xs text-[#333333] font-medium app-tag app-tag-zeta-1\">Precision instruments</span>\n                            <span class=\"px-2.5 py-1 bg-white rounded-md text-xs text-[#333333] font-medium app-tag app-tag-zeta-2\">Audio electronics</span>\n                            <span class=\"px-2.5 py-1 bg-white rounded-md text-xs text-[#333333] font-medium app-tag app-tag-zeta-3\">Medical devices</span>\n                            <span class=\"px-2.5 py-1 bg-white rounded-md text-xs text-[#333333] font-medium app-tag app-tag-zeta-4\">Measurement systems</span>\n                            <span class=\"px-2.5 py-1 bg-white rounded-md text-xs text-[#333333] font-medium app-tag app-tag-zeta-5\">Lab power supplies</span>\n                            <span class=\"px-2.5 py-1 bg-white rounded-md text-xs text-[#333333] font-medium app-tag app-tag-zeta-6\">Sensor interfaces</span>\n                            <span class=\"px-2.5 py-1 bg-white rounded-md text-xs text-[#333333] font-medium app-tag app-tag-zeta-7\">Low-noise RF power</span>\n                        </div>\n                    </div>\n                </div>\n            </main>\n            \n            <!-- Footer -->\n            <footer class=\"flex-shrink-0 flex justify-between items-center text-sm text-[#999999] pt-3 border-t border-[#E0E0E0] mt-2\">\n                <!-- Presentation Title -->\n                <span id=\"footer\">UniMAP FYP · Jeevanjeet Singh (221091048) · PM Dr. Leong Jenn Hwai</span>\n                <!-- Page Number -->\n                <span id=\"page-number\">22</span>\n            </footer>\n        </div>\n    </div>\n\n</body></html>","<!DOCTYPE html><html lang=\"en\"><head>\n    <meta charset=\"utf-8\">\n    <meta content=\"width=1280, initial-scale=1.0\" name=\"viewport\">\n    <title>Discussion - Model Agreement &amp; Limitations</title>\n    <script src=\"assets/0e205e71e3e4.js\"><\/script>\n    <link href=\"assets/2e567bec48f9.css\" rel=\"stylesheet\">\n    <link href=\"assets/a08e56a46b79.css\" rel=\"stylesheet\">\n    <style>\n        body { \n            font-family: 'Crimson Pro', Georgia, serif;\n        }\n        \n        /* Animation Keyframes */\n        @keyframes fadeIn {\n            from {\n                opacity: 0;\n            }\n            to {\n                opacity: 1;\n            }\n        }\n        \n        @keyframes expandBox {\n            from {\n                opacity: 0;\n                transform: scale(0.95);\n            }\n            to {\n                opacity: 1;\n                transform: scale(1);\n            }\n        }\n        \n        @keyframes stackFromBottom {\n            from {\n                opacity: 0;\n                transform: translateY(40px);\n            }\n            to {\n                opacity: 1;\n                transform: translateY(0);\n            }\n        }\n        \n        @keyframes glowPulse {\n            0%, 100% {\n                box-shadow: 0 0 10px rgba(218, 119, 86, 0.3);\n            }\n            50% {\n                box-shadow: 0 0 20px rgba(218, 119, 86, 0.6);\n            }\n        }\n        \n        @keyframes highlightTerm {\n            0% {\n                background-color: transparent;\n            }\n            50% {\n                background-color: rgba(218, 119, 86, 0.2);\n            }\n            100% {\n                background-color: transparent;\n            }\n        }\n        \n        @keyframes badgePop {\n            0% {\n                opacity: 0;\n                transform: scale(0);\n            }\n            60% {\n                transform: scale(1.1);\n            }\n            100% {\n                opacity: 1;\n                transform: scale(1);\n            }\n        }\n        \n        @keyframes numberFloat {\n            0%, 100% {\n                transform: translateY(0);\n            }\n            50% {\n                transform: translateY(-3px);\n            }\n        }\n        \n        /* Animation Classes */\n        .title-animate {\n            animation: fadeIn 0.3s ease-out forwards;\n            opacity: 0;\n        }\n        \n        .validation-animate {\n            animation: expandBox 0.6s ease-out forwards;\n            animation-delay: 0.6s;\n            opacity: 0;\n        }\n        \n        .badge-animate {\n            animation: badgePop 0.4s ease-out forwards;\n            opacity: 0;\n        }\n        \n        .badge-1 { animation-delay: 0.8s; }\n        .badge-2 { animation-delay: 0.9s; }\n        .badge-3 { animation-delay: 1.0s; }\n        \n        .discrepancy-1 {\n            animation: stackFromBottom 0.8s ease-out forwards;\n            animation-delay: 0.9s;\n            opacity: 0;\n        }\n        \n        .discrepancy-2 {\n            animation: stackFromBottom 0.8s ease-out forwards;\n            animation-delay: 1.3s;\n            opacity: 0;\n        }\n        \n        .discrepancy-3 {\n            animation: stackFromBottom 0.8s ease-out forwards;\n            animation-delay: 1.7s;\n            opacity: 0;\n        }\n        \n        .discrepancy-4 {\n            animation: stackFromBottom 0.8s ease-out forwards;\n            animation-delay: 2.1s;\n            opacity: 0;\n        }\n        \n        .conclusion-animate {\n            animation: expandBox 0.6s ease-out forwards, glowPulse 2s ease-in-out infinite;\n            animation-delay: 2.5s, 3.1s;\n            opacity: 0;\n        }\n        \n        .highlight-term {\n            animation: highlightTerm 1.5s ease-out;\n            padding: 0 2px;\n            border-radius: 2px;\n        }\n        \n        .number-icon {\n            animation: numberFloat 2s ease-in-out infinite;\n        }\n        \n        .discrepancy-1 .number-icon { animation-delay: 0s; }\n        .discrepancy-2 .number-icon { animation-delay: 0.5s; }\n        .discrepancy-3 .number-icon { animation-delay: 1s; }\n        .discrepancy-4 .number-icon { animation-delay: 1.5s; }\n        \n        .success-badge {\n            display: inline-flex;\n            align-items: center;\n            gap: 4px;\n            background: linear-gradient(135deg, #10b981 0%, #059669 100%);\n            color: white;\n            padding: 4px 10px;\n            border-radius: 12px;\n            font-size: 10px;\n            font-weight: 600;\n            box-shadow: 0 2px 4px rgba(16, 185, 129, 0.3);\n        }\n        \n        .insight-icon {\n            display: inline-flex;\n            align-items: center;\n            justify-content: center;\n            width: 28px;\n            height: 28px;\n            background: linear-gradient(135deg, #DA7756 0%, #c96545 100%);\n            color: white;\n            border-radius: 50%;\n            font-size: 14px;\n            box-shadow: 0 2px 6px rgba(218, 119, 86, 0.4);\n        }\n        \n        .numbered-box {\n            position: relative;\n        }\n        \n        .number-badge {\n            position: absolute;\n            top: -8px;\n            left: -8px;\n            width: 32px;\n            height: 32px;\n            background: linear-gradient(135deg, #DA7756 0%, #c96545 100%);\n            color: white;\n            border-radius: 50%;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            font-weight: 700;\n            font-size: 14px;\n            box-shadow: 0 3px 8px rgba(218, 119, 86, 0.5);\n            z-index: 10;\n        }\n    </style>\n</head>\n<body class=\"min-h-screen flex items-center justify-center bg-[#FAF9F6]\">\n    <div class=\"slide-container relative flex flex-col w-[1280px] h-[720px] max-w-[1280px] max-h-[720px] aspect-[16/9] overflow-hidden bg-[#FAF9F6]\">\n        <!-- Content -->\n        <div class=\"relative z-10 flex flex-col flex-grow p-[50px]\">\n            <!-- Header -->\n            <header class=\"flex-shrink-0 pb-2 title-animate\">\n                <h1 class=\"text-3xl font-semibold text-[#000000]\">Discussion — Model Agreement &amp; Sources of Discrepancy</h1>\n                <!-- Decorative Element: Accent Bar -->\n                <div class=\"w-16 h-0.5 bg-[#DA7756] mt-2\"></div>\n            </header>\n            <!-- Main Content -->\n            <main class=\"flex-grow flex flex-col justify-start min-h-0 mt-3\">\n                <div class=\"w-full space-y-3\">\n                    <!-- Validation Summary -->\n                    <div class=\"bg-[#F5E6E0] rounded-lg p-4 validation-animate\" style=\"box-shadow: 0 4px 12px rgba(218, 119, 86, 0.15);\">\n                        <div class=\"flex items-start justify-between mb-2\">\n                            <p class=\"text-sm text-[#000000] leading-relaxed flex-1\">\n                                <strong>Validation Summary:</strong> SEPIC duty cycle error <span class=\"highlight-term\">&lt;0.001</span> · ZETA duty cycle error <span class=\"highlight-term\">&lt;0.003</span> · Efficiency error <span class=\"highlight-term\">5–7%</span> · Energy closure <span class=\"highlight-term\">&lt;0.13%</span> (ZETA), <span class=\"highlight-term\">&lt;0.60%</span> (SEPIC) → Analytical model validated for design-stage use\n                            </p>\n                            <div class=\"flex gap-2 ml-3\">\n                                <span class=\"success-badge badge-animate badge-1\">\n                                    <i class=\"fas fa-check-circle\"></i> CCM ✓\n                                </span>\n                                <span class=\"success-badge badge-animate badge-2\">\n                                    <i class=\"fas fa-check-circle\"></i> Sizing ✓\n                                </span>\n                                <span class=\"success-badge badge-animate badge-3\">\n                                    <i class=\"fas fa-check-circle\"></i> Ripple ✓\n                                </span>\n                            </div>\n                        </div>\n                        <p class=\"text-sm text-[#666666] leading-relaxed\">\n                            Agreement confirms: <span class=\"highlight-term\">CCM equations</span>, <span class=\"highlight-term\">component sizing</span>, <span class=\"highlight-term\">inductor stress</span>, and <span class=\"highlight-term\">capacitor ripple</span> calculations are correct. Efficiency gap stems from switching loss methodology difference.\n                        </p>\n                    </div>\n                    \n                    <!-- Sources of Discrepancies -->\n                    <div class=\"grid grid-cols-2 gap-3\">\n                        <!-- Discrepancy 1: Switching Loss Gap -->\n                        <div class=\"bg-white rounded-lg p-4 border-l-4 border-[#DA7756] discrepancy-1 numbered-box\" style=\"box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);\">\n                            <div class=\"number-badge number-icon\">1</div>\n                            <h3 class=\"text-base font-semibold text-[#DA7756] mb-2\">Switching Loss Gap: 69–87% Overestimate (Primary Source)</h3>\n                            <p class=\"text-xs text-[#000000] leading-relaxed mb-2\">\n                                <strong>MATLAB:</strong> linear model <span class=\"highlight-term\">P<sub>sw</sub> = ½·V<sub>sw</sub>·I<sub>sw,peak</sub>·(t<sub>r</sub>+t<sub>f</sub>)·f<sub>s</sub></span> — uses datasheet <span class=\"highlight-term\">t<sub>r</sub>=84ns</span>, <span class=\"highlight-term\">t<sub>f</sub>=15ns</span> (measured at I<sub>D</sub>=25A, not 1–4A operating range).\n                            </p>\n                            <p class=\"text-xs text-[#000000] leading-relaxed mb-2\">\n                                <strong>PSIM:</strong> integrates real-time <span class=\"highlight-term\">v<sub>DS</sub>·i<sub>D</sub></span> — captures nonlinear <span class=\"highlight-term\">Miller plateau</span>, <span class=\"highlight-term\">C<sub>oss</sub> discharge</span>, and turn-on losses not in linear model.\n                            </p>\n                            <p class=\"text-xs text-[#666666] leading-relaxed\">\n                                After refinement (PSIM-extracted I<sub>turnoff</sub>, <span class=\"highlight-term\">t<sub>sw,eff</sub>=22–30ns</span>), error drops from <span class=\"highlight-term\">78% avg</span> to <span class=\"highlight-term\">36% avg</span>.\n                            </p>\n                        </div>\n                        \n                        <!-- Discrepancy 2: Temperature Non-Linearity -->\n                        <div class=\"bg-white rounded-lg p-4 border-l-4 border-[#DA7756] discrepancy-2 numbered-box\" style=\"box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);\">\n                            <div class=\"number-badge number-icon\">2</div>\n                            <h3 class=\"text-base font-semibold text-[#DA7756] mb-2\">Temperature Non-Linearity</h3>\n                            <p class=\"text-xs text-[#000000] leading-relaxed mb-2\">\n                                <strong>MATLAB:</strong> applies linear <span class=\"highlight-term\">R<sub>DS(on)</sub></span> temperature coefficient (second-order polynomial from IRLZ44N datasheet).\n                            </p>\n                            <p class=\"text-xs text-[#000000] leading-relaxed mb-2\">\n                                <strong>PSIM Level-2:</strong> uses physics-based <span class=\"highlight-term\">C-V curves</span> and <span class=\"highlight-term\">non-linear temperature dependence</span> — more accurate especially at elevated <span class=\"highlight-term\">T<sub>j</sub> (100–150°C)</span> range where MOSFETs operate in this project.\n                            </p>\n                            <p class=\"text-xs text-[#666666] leading-relaxed\">\n                                This creates small but systematic efficiency differences.\n                            </p>\n                        </div>\n                        \n                        <!-- Discrepancy 3: Gate Drive Dynamics -->\n                        <div class=\"bg-white rounded-lg p-4 border-l-4 border-[#DA7756] discrepancy-3 numbered-box\" style=\"box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);\">\n                            <div class=\"number-badge number-icon\">3</div>\n                            <h3 class=\"text-base font-semibold text-[#DA7756] mb-2\">Gate Drive Dynamics &amp; Miller Effect</h3>\n                            <p class=\"text-xs text-[#000000] leading-relaxed mb-2\">\n                                <strong>MATLAB:</strong> assumes constant gate current <span class=\"highlight-term\">I<sub>g</sub> = V<sub>gate</sub>/R<sub>g</sub> = 10V/33Ω = 0.3A</span> throughout the switching transition.\n                            </p>\n                            <p class=\"text-xs text-[#000000] leading-relaxed mb-2\">\n                                <strong>PSIM:</strong> simulates the actual <span class=\"highlight-term\">R<sub>g</sub> gate resistor circuit</span> with <span class=\"highlight-term\">parasitic inductances</span> — the real gate current waveform varies, <span class=\"highlight-term\">Miller plateau duration</span> differs, affecting both turn-on and turn-off energy dissipation.\n                            </p>\n                            <p class=\"text-xs text-[#666666] leading-relaxed\">\n                                Cannot be captured without circuit-level simulation.\n                            </p>\n                        </div>\n                        \n                        <!-- Discrepancy 4: Passive Component & Post-Processing -->\n                        <div class=\"bg-white rounded-lg p-4 border-l-4 border-[#DA7756] discrepancy-4 numbered-box\" style=\"box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);\">\n                            <div class=\"number-badge number-icon\">4</div>\n                            <h3 class=\"text-base font-semibold text-[#DA7756] mb-2\">Passive Component &amp; Post-Processing Effects</h3>\n                            <p class=\"text-xs text-[#000000] leading-relaxed mb-2\">\n                                <strong>MATLAB:</strong> explicitly includes <span class=\"highlight-term\">P<sub>diode,cap</sub> = ½·C<sub>j</sub>·V<sub>sw</sub>²·f<sub>s</sub></span> = ½×250pF×21²×340kHz ≈ <span class=\"highlight-term\">0.0195W</span> (constant). Basic PSIM diode model (SS34) may omit this <span class=\"highlight-term\">junction capacitance loss</span>.\n                            </p>\n                            <p class=\"text-xs text-[#000000] leading-relaxed mb-2\">\n                                <strong>Also:</strong> PSIM captures <span class=\"highlight-term\">package parasitic inductances</span> causing <span class=\"highlight-term\">V<sub>DS</sub>/V<sub>GS</sub> overshoots</span> and ringing — not modelled.\n                            </p>\n                            <p class=\"text-xs text-[#666666] leading-relaxed\">\n                                Python numerical integration in post-processing introduces minor errors (<span class=\"highlight-term\">&lt;0.13% energy closure</span> achieved).\n                            </p>\n                        </div>\n                    </div>\n                    \n                    <!-- Conclusion -->\n                    <div class=\"bg-[#F5E6E0] rounded-lg p-4 border-l-4 border-[#DA7756] conclusion-animate flex items-center gap-3\">\n                        <div class=\"insight-icon flex-shrink-0\">\n                            <i class=\"fas fa-lightbulb\"></i>\n                        </div>\n                        <p class=\"text-sm text-[#000000] leading-relaxed flex-1\">\n                            <strong>Conclusion:</strong> These are <span class=\"highlight-term\">physically justified methodology differences</span>, not model errors. The analytical model is <span class=\"highlight-term\">fully appropriate for design-stage loss estimation</span> and <span class=\"highlight-term\">topology comparison</span>.\n                        </p>\n                    </div>\n                </div>\n            </main>\n            <!-- Footer -->\n            <footer class=\"flex-shrink-0 flex justify-between items-center text-sm text-[#999999] pt-3 border-t border-[#E0E0E0] mt-2\">\n                <!-- Presentation Title -->\n                <span id=\"footer\">UniMAP FYP · Jeevanjeet Singh (221091048) · PM Dr. Leong Jenn Hwai</span>\n                <!-- Page Number -->\n                <span id=\"page-number\">23</span>\n            </footer>\n        </div>\n    </div>\n\n</body></html>","<!DOCTYPE html><html lang=\"en\"><head>\n    <meta charset=\"utf-8\">\n    <meta content=\"width=1280, initial-scale=1.0\" name=\"viewport\">\n    <title>Conclusions</title>\n    <script src=\"assets/0e205e71e3e4.js\"><\/script>\n    <link href=\"assets/2e567bec48f9.css\" rel=\"stylesheet\">\n    <link href=\"assets/a08e56a46b79.css\" rel=\"stylesheet\">\n    <style>\n        body { \n            font-family: 'Crimson Pro', Georgia, serif;\n        }\n        \n        /* Animation keyframes */\n        @keyframes zoomIn {\n            from {\n                opacity: 0;\n                transform: scale(0.8);\n            }\n            to {\n                opacity: 1;\n                transform: scale(1);\n            }\n        }\n        \n        @keyframes slideInLeft {\n            from {\n                opacity: 0;\n                transform: translateX(-80px);\n            }\n            to {\n                opacity: 1;\n                transform: translateX(0);\n            }\n        }\n        \n        @keyframes slideInRight {\n            from {\n                opacity: 0;\n                transform: translateX(80px);\n            }\n            to {\n                opacity: 1;\n                transform: translateX(0);\n            }\n        }\n        \n        @keyframes checkmarkPop {\n            0% {\n                opacity: 0;\n                transform: scale(0);\n            }\n            50% {\n                transform: scale(1.2);\n            }\n            100% {\n                opacity: 1;\n                transform: scale(1);\n            }\n        }\n        \n        @keyframes pulse {\n            0%, 100% {\n                transform: scale(1);\n            }\n            50% {\n                transform: scale(1.15);\n            }\n        }\n        \n        @keyframes arrowUp {\n            0%, 100% {\n                transform: translateY(0);\n            }\n            50% {\n                transform: translateY(-5px);\n            }\n        }\n        \n        @keyframes waveDown {\n            0%, 100% {\n mark animate-checkmark-2\"></i>\n                        <span>CCM verified all 9 pts (both)</span>\n                    </span>\n                    <span class=\"text-[#CCCCCC]\">·</span>\n                    <span class=\"flex items-center gap-2\">\n                        <i class=\"fas fa-check-circle text-[#4CAF50] text-base animate-checkmark animate-checkmark-3\"></i>\n                        <span>MATLAB loss models developed</span>\n                    </span>\n                    <span class=\"text-[#CCCCCC]\">·</span>\n                    <span class=\"flex items-center gap-2\">\n                        <i class=\"fas fa-check-circle text-[#4CAF50] text-base animate-checkmark animate-checkmark-4\"></i>\n                        <span>PSIM cross-validation completed</span>\n                    </span>\n                    <span class=\"text-[#CCCCCC]\">·</span>\n                    <span class=\"flex items-center gap-2\">\n                        <i class=\"fas fa-check-circle text-[#4CAF50] text-base animate-checkmark animate-checkmark-5\"></i>\n                        <span>Topology trade-offs identified</span>\n                    </span>\n                </div>\n            </div>\n            \n            <!-- Main Content Grid -->\n            <main class=\"flex-grow grid grid-cols-2 gap-x-8 gap-y-5 min-h-0\">\n                <!-- Finding 1: MOSFET Switching Loss Dominates -->\n                <div class=\"flex items-start gap-3 animate-slide-left-1\">\n                    <div class=\"w-12 h-12 bg-[#DA7756] rounded-lg flex items-center justify-center flex-shrink-0 shadow-md\">\n                        <i class=\"fas fa-microchip text-white text-xl icon-pulse\"></i>\n                    </div>\n                    <div class=\"flex-1\">\n                        <div class=\"flex items-center gap-2 mb-1.5\">\n                            <span class=\"text-2xl font-bold text-[#DA7756]\">1</span>\n                            <h2 class=\"text-lg font-semibold text-[#000000]\">MOSFET Switching Loss Dominates Both</h2>\n                        </div>\n                        <p class=\"text-sm text-[#666666] leading-relaxed\">\n                            Q1sw = <strong class=\"text-[#DA7756]\">48–55%</strong> of total stage loss at all 9 operating points in both converters. At 340 kHz, switching energy is dissipated 340,000×/sec. Cannot be ignored. After refinement, PSIM confirms <strong>1.20–1.45W</strong> switching loss range at 9V/1.5A. Dominant loss source in both topologies.\n                        </p>\n                    </div>\n                </div>\n                \n                <!-- Finding 2: SEPIC Higher Efficiency -->\n                <div class=\"flex items-start gap-3 animate-slide-right-2\">\n                    <div class=\"w-12 h-12 bg-[#5B9BD5] rounded-lg flex items-center justify-center flex-shrink-0 shadow-md\">\n                        <i class=\"fas fa-arrow-trend-up text-white text-xl icon-arrow-up\"></i>\n                    </div>\n                    <div class=\"flex-1\">\n                        <div class=\"flex items-center gap-2 mb-1.5\">\n                            <span class=\"text-2xl font-bold text-[#5B9BD5]\">2</span>\n                            <h2 class=\"text-lg font-semibold text-[#000000]\">SEPIC: Higher Efficiency by 0.04–0.35%</h2>\n                        </div>\n                        <p class=\"text-sm text-[#666666] leading-relaxed\">\n                            Stage efficiency <strong class=\"text-[#5B9BD5]\">86.34–88.14%</strong> vs ZETA 85.99–88.06%. Primary reason: ZETA Cin ESR loss (0.01–0.11W) from discontinuous input current. System efficiency: SEPIC <strong>85.51–87.31%</strong> vs ZETA 85.33–87.18%. Advantage: continuous input current, smaller Cin, lower EMI.\n                        </p>\n                    </div>\n                </div>\n                \n                <!-- Finding 3: ZETA Lower Output Ripple -->\n                <div class=\"flex items-start gap-3 animate-slide-left-3\">\n                    <div class=\"w-12 h-12 bg-[#B8C5B0] rounded-lg flex items-center justify-center flex-shrink-0 shadow-md\">\n                        <i class=\"fas fa-water text-white text-xl icon-wave-down\"></i>\n                    </div>\n                    <div class=\"flex-1\">\n                        <div class=\"flex items-center gap-2 mb-1.5\">\n                            <span class=\"text-2xl font-bold text-[#B8C5B0]\">3</span>\n                            <h2 class=\"text-lg font-semibold text-[#000000]\">ZETA: 5–15× Lower Output Ripple</h2>\n                        </div>\n                        <p class=\"text-sm text-[#666666] leading-relaxed\">\n                            Output ripple: ZETA <strong class=\"text-[#B8C5B0]\">3.9–5.1mV</strong> vs SEPIC 13.4–57.8mV — <strong>5 to 15× reduction</strong> across all operating points. Achieved with only 1µF output capacitor vs SEPIC's 15µF. Output inductor L2 in series with load provides inherent ripple suppression — fundamental topology advantage.\n                        </p>\n                    </div>\n                </div>\n                \n                <!-- Finding 4: Both Thermally Safe -->\n                <div class=\"flex items-start gap-3 animate-slide-right-4\">\n                    <div class=\"w-12 h-12 bg-[#2E5C8A] rounded-lg flex items-center justify-center flex-shrink-0 shadow-md\">\n                        <i class=\"fas fa-shield-halved text-white text-xl icon-safety-check\"></i>\n                    </div>\n                    <div class=\"flex-1\">\n                        <div class=\"flex items-center gap-2 mb-1.5\">\n                            <span class=\"text-2xl font-bold text-[#2E5C8A]\">4</span>\n                            <h2 class=\"text-lg font-semibold text-[#000000]\">Both Thermally Safe &amp; CCM Confirmed</h2>\n                        </div>\n                        <p class=\"text-sm text-[#666666] leading-relaxed\">\n                            SEPIC peak Tj=<strong class=\"text-[#2E5C8A]\">149.8°C</strong>, ZETA peak Tj=150.2°C — both below 175°C IRLZ44N absolute maximum at Tamb=40°C. Safety margin: <strong>25.2°C</strong> (SEPIC), 24.8°C (ZETA). Heatsink recommended for Tj&gt;125°C. All 9 pts CCM confirmed: iL,min &gt; 0 at all times.\n                        </p>\n                    </div>\n                </div>\n            </main>\n            \n            <!-- Footer -->\n            <footer class=\"flex-shrink-0 flex justify-between items-center text-sm text-[#999999] pt-4 border-t border-[#E0E0E0] mt-4\">\n                <!-- Presentation Title -->\n                <span id=\"footer\">UniMAP FYP · Jeevanjeet Singh (221091048) · PM Dr. Leong Jenn Hwai</span>\n                <!-- Page Number -->\n                <span id=\"page-number\">24</span>\n            </footer>\n        </div>\n    </div>\n\n</body></html>","<!DOCTYPE html><html lang=\"en\"><head>\n    <meta charset=\"utf-8\">\n    <meta content=\"width=1280, initial-scale=1.0\" name=\"viewport\">\n    <title>Future Work Recommendations</title>\n    <script src=\"assets/0e205e71e3e4.js\"><\/script>\n    <link href=\"assets/2e567bec48f9.css\" rel=\"stylesheet\">\n    <link href=\"assets/a08e56a46b79.css\" rel=\"stylesheet\">\n    <style>\n        body { \n            font-family: 'Crimson Pro', Georgia, serif;\n        }\n        \n        /* Animation keyframes */\n        @keyframes fadeIn {\n            from {\n                opacity: 0;\n                transform: translateY(20px);\n            }\n            to {\n                opacity: 1;\n                transform: translateY(0);\n            }\n        }\n        \n        @keyframes scaleIn {\n            from {\n                opacity: 0;\n                transform: scale(0.8);\n            }\n            to {\n                opacity: 1;\n                transform: scale(1);\n            }\n        }\n        \n        @keyframes dr          <span class=\"text-[#DA7756] mt-0.5 flex-shrink-0\">•</span>\n                                    <span>Design and fabricate physical SEPIC &amp; ZETA PCBs with same component values</span>\n                                </li>\n                                <li class=\"flex items-start gap-2 typewriter-item typewriter-2\">\n                                    <span class=\"text-[#DA7756] mt-0.5 flex-shrink-0\">•</span>\n                                    <span>Double Pulse Test (DPT) — characterise E<sub>on</sub>, E<sub>off</sub>, Q<sub>rr</sub> at actual 1–4A range (not 25A datasheet)</span>\n                                </li>\n                                <li class=\"flex items-start gap-2 typewriter-item typewriter-3\">\n                                    <span class=\"text-[#DA7756] mt-0.5 flex-shrink-0\">•</span>\n                                    <span>Experimental efficiency measurement and comparison with MATLAB/PSIM predictions</span>\n                                </li>\n                                <li class=\"flex items-start gap-2 typewriter-item typewriter-4\">\n                                    <span class=\"text-[#DA7756] mt-0.5 flex-shrink-0\">•</span>\n                                    <span>Thermal imaging to verify electro-thermal model junction temperature estimates</span>\n                                </li>\n                            </ul>\n                        </div>\n                        \n                        <!-- Card 2: Advanced Model Refinements -->\n                        <div class=\"bg-white rounded-xl shadow-lg border-2 border-[#DA7756] p-5 flex flex-col animate-card-2 relative\">\n                            <!-- Roadmap Node Number -->\n                            <div class=\"absolute -top-3 -left-3 w-8 h-8 bg-[#DA7756] text-white rounded-full flex items-center justify-center font-bold text-sm shadow-md\">2</div>\n                            <!-- Icon -->\n                            <         var iframe = document.getElementById('slideFrame');
        var total = SLIDES.length;
        var current = 0;
        var WIDTH = 1280;
        var HEIGHT = 720;

        function fitScale() {
          if (!iframe) return;
          var scale = Math.min(window.innerWidth / WIDTH, window.innerHeight / HEIGHT);
          iframe.style.transform = 'scale(' + scale + ')';
          iframe.style.transformOrigin = 'center center';
        }

        function show(index) {
          if (index < 0 || index >= total) return;
          current = index;
          iframe.srcdoc = SLIDES[current];
          fitScale();
        }

        function enterFullscreen() {
          var el = document.documentElement;
          (el.requestFullscreen || el.webkitRequestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen).call(el);
        }

        function exitFullscreen() {
          var doc = document;
          (doc.exitFullscreen || doc.webkitExitFullscreen || doc.webkitCancelFullScreen || doc.mozCancelFullScreen || doc.msExitFullscreen).call(doc);
        }

        function showFullscreenHint() {
          trigger.classList.remove('ready');
        }

        function hideFullscreenHint() {
          trigger.classList.add('ready');
        }

        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') {
            exitFullscreen();
            return;
          }
          var trigger = document.getElementById('fullscreenTrigger');
          if (!trigger.classList.contains('ready')) return;
          if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { if (current > 0) show(current - 1); e.preventDefault(); }
          if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { if (current < total - 1) show(current + 1); e.preventDefault(); }
        });

        function onFullscreenChange() {
          var isFs = !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
          if (isFs) hideFullscreenHint();
          else showFullscreenHint();
        }
        document.addEventListener('fullscreenchange', onFullscreenChange);
        document.addEventListener('webkitfullscreenchange', onFullscreenChange);
        document.addEventListener('mozfullscreenchange', onFullscreenChange);
        document.addEventListener('MSFullscreenChange', onFullscreenChange);

        var trigger = document.getElementById('fullscreenTrigger');
        var overlay = document.getElementById('fullscreenOverlay');
        overlay.addEventListener('click', function(e) {
          if (trigger.classList.contains('ready')) {
            var mid = window.innerWidth / 2;
            if (e.clientX < mid) { if (current > 0) show(current - 1); }
            else { if (current < total - 1) show(current + 1); }
          } else if (e.target === trigger || trigger.contains(e.target)) {
            enterFullscreen();
          }
        });
